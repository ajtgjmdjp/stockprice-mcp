name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest --cov=yfinance_mcp --cov-report=term-missing -v

  sdist-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist
        run: uv build --sdist
      - name: Audit sdist for secrets
        run: |
          set -euo pipefail
          SDIST=$(ls dist/*.tar.gz)
          echo "Checking $SDIST"

          BAD_FILES=$(tar tzf "$SDIST" | grep -iE '\.env($|\.)|mcpregistry|_token$|_secret$|\.pem$|\.key$|\.p12$|id_rsa' || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Dangerous files found in sdist:"
            echo "$BAD_FILES"
            exit 1
          fi

          TEMP_DIR=$(mktemp -d)
          tar xzf "$SDIST" -C "$TEMP_DIR"
          LEAKED=$(grep -rE 'ghu_[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|ghs_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}|pypi-[A-Za-z0-9]{20,}|-----BEGIN.*PRIVATE KEY' "$TEMP_DIR" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Token patterns found in sdist content:"
            echo "$LEAKED" | sed "s|$TEMP_DIR/||"
            exit 1
          fi

          echo "sdist audit passed — no secrets detected"
          rm -rf "$TEMP_DIR"
